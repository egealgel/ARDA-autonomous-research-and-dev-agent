services:
  postgres:
    image: postgres:16-alpine
    container_name: arda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arda
      POSTGRES_PASSWORD: arda_dev
      POSTGRES_DB: arda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arda -d arda"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
